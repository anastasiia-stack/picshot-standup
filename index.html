<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PicShot · Daily Standup Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg: #0f0f11; --surface: #18181c; --surface2: #222228;
  --border: #2e2e38; --accent: #ff6b00; --accent-dim: rgba(255,107,0,0.12);
  --text: #e8e8f0; --muted: #7a7a8c; --dim: #4a4a58;
  --green: #4ade80; --blue: #60a5fa; --red: #f87171;
  --mono: 'JetBrains Mono','Fira Code',monospace;
  --sans: 'Inter',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}

header{padding:18px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px}
.logo{width:30px;height:30px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#000;flex-shrink:0}
header h1{font-size:14px;font-weight:600}
header .today{font-size:12px;color:var(--muted);margin-left:auto}

main{max-width:900px;margin:0 auto;padding:24px 28px}

/* Upload */
.upload-zone{border:1.5px dashed var(--border);border-radius:12px;padding:40px 24px;text-align:center;cursor:pointer;transition:all .2s;position:relative;background:var(--surface)}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--accent);background:var(--accent-dim)}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-zone .icon{font-size:32px;margin-bottom:10px;display:block}
.upload-zone h2{font-size:15px;font-weight:600;margin-bottom:4px}
.upload-zone p{font-size:12px;color:var(--muted)}

/* Person selector */
.person-section{margin-top:18px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:none}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.section-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.btn-sm{background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:11px;padding:3px 10px;cursor:pointer;font-family:var(--sans);transition:all .15s}
.btn-sm:hover{border-color:var(--accent);color:var(--accent)}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{display:flex;align-items:center;gap:4px;background:var(--surface2);border:1.5px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s;user-select:none}
.chip.on{background:rgba(96,165,250,.1);border-color:#60a5fa;color:#93c5fd}
.chip:hover{opacity:.8}

/* Controls */
.controls{display:flex;gap:10px;align-items:center;margin-top:16px;flex-wrap:wrap}
.date-label{font-size:13px;color:var(--muted);font-weight:500}
input[type=date]{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:7px 12px;font-size:13px;font-family:var(--sans);cursor:pointer;outline:none;transition:border-color .2s}
input[type=date]:hover,input[type=date]:focus{border-color:var(--accent)}
.btn{background:var(--accent);color:#000;border:none;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s;font-family:var(--sans)}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--muted);opacity:1}
.status{font-size:12px;padding:5px 11px;border-radius:6px;background:var(--surface2);color:var(--muted);margin-left:auto}
.status.ok{color:var(--green)}
.status.err{color:var(--red)}

/* Results */
.results{margin-top:24px;display:none}
.results.show{display:block}

/* Tabs */
.tabs{display:flex;gap:2px;background:var(--surface2);border-radius:8px;padding:3px;width:fit-content;margin-bottom:16px}
.tab{padding:6px 16px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);border:none;background:transparent;font-family:var(--sans);transition:all .15s}
.tab.on{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.3)}
.tabpanel{display:none}
.tabpanel.on{display:block}

/* Preview cards */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px;margin-bottom:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.card-name{font-size:13px;font-weight:700;color:var(--blue);margin-bottom:8px}
.card-name span{color:var(--muted);font-weight:400}
.task-row{display:flex;gap:7px;align-items:flex-start;margin-bottom:4px}
.task-time{font-size:10px;font-weight:600;color:var(--muted);background:var(--surface2);border-radius:4px;padding:2px 5px;white-space:nowrap;margin-top:1px;flex-shrink:0}
.task-text{font-size:12px;line-height:1.5}
.pill{display:inline-block;font-size:10px;font-weight:600;padding:1px 7px;border-radius:20px;margin-left:5px;vertical-align:middle}
.vacation{font-size:12px;color:var(--muted);font-style:italic}

/* Delivery */
.del-chips{display:flex;flex-wrap:wrap;gap:7px}
.del-chip{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;padding:6px 12px;cursor:pointer;transition:all .15s;user-select:none}
.del-chip.on{background:rgba(74,222,128,.08);border-color:var(--green)}
.del-chip:hover{opacity:.8}
.del-chip-dot{width:7px;height:7px;border-radius:50%;background:var(--border);flex-shrink:0;transition:background .15s}
.del-chip.on .del-chip-dot{background:var(--green)}
.del-chip-text{font-size:12px;font-weight:600;color:var(--muted);transition:color .15s}
.del-chip.on .del-chip-text{color:var(--text)}
.del-chip-desc{font-size:11px;color:var(--dim)}
.del-chip.on .del-chip-desc{color:var(--muted)}
.tags-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:6px}
.tag-row{display:flex;align-items:center;gap:8px}
.tag-name{font-size:12px;font-weight:600;color:var(--text);min-width:80px;flex-shrink:0}
.tag-input{background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--text);padding:4px 10px;font-size:12px;font-family:var(--mono);width:150px;outline:none}
.tag-input:focus{border-color:var(--accent)}
.tag-input::placeholder{color:var(--dim)}
.del-client-pill{display:inline-block;font-size:10px;font-weight:600;padding:1px 6px;border-radius:10px;margin-left:6px;vertical-align:middle}
.del-note{font-size:11px;color:var(--dim);font-style:italic;margin-top:8px}

/* Message box */
.msgbox{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.msgbar{display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid var(--border);background:var(--surface2)}
.msgbar-dots{display:flex;gap:5px}
.msgbar-dots span{width:9px;height:9px;border-radius:50%;background:var(--border)}
.msgbar-lbl{font-size:11px;color:var(--dim);flex:1;text-align:center;letter-spacing:.04em}
.msg{padding:18px 22px;font-family:var(--mono);font-size:13px;line-height:1.8;white-space:pre-wrap;word-break:break-word;min-height:80px;outline:none}
.msg:empty::before{content:'Завантажте роадмап...';color:var(--dim);font-style:italic}
.copy-row{display:flex;gap:8px;align-items:center;margin-top:10px}
.copy-ok{font-size:12px;color:var(--green);opacity:0;transition:opacity .3s}
.copy-ok.show{opacity:1}

/* Color mapping editor */
.color-map-section{margin-top:16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.color-map-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:6px;margin-top:10px}
.color-map-row{display:flex;align-items:center;gap:8px}
.color-swatch{width:18px;height:18px;border-radius:4px;flex-shrink:0;border:1px solid rgba(255,255,255,.1)}
.color-label{font-size:11px;color:var(--muted);min-width:70px}
.color-input{background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--text);padding:3px 8px;font-size:11px;font-family:var(--sans);width:120px;outline:none}
.color-input:focus{border-color:var(--accent)}

.error-box{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);border-radius:8px;padding:12px 16px;font-size:13px;color:#fca5a5;margin-top:14px;display:none}
</style>
</head>
<body>

<header>
  <div class="logo">PS</div>
  <h1>Daily Standup Generator</h1>
  <span class="today" id="todayLbl"></span>
</header>

<main>
  <div class="upload-zone" id="uploadZone">
    <input type="file" id="fileInput" accept=".xlsx,.xls">
    <span class="icon">📊</span>
    <h2>Завантажте роадмап</h2>
    <p>Перетягніть .xlsx файл або натисніть</p>
  </div>

  <!-- Dynamic person chips -->
  <div class="person-section" id="personSection">
    <div class="section-header">
      <span class="section-label">Команда в повідомленні</span>
      <button class="btn-sm" id="toggleAll">Зняти всіх</button>
    </div>
    <div class="chips" id="chips"></div>
  </div>

  <!-- Slack tags -->
  <div class="person-section" id="tagsSection" style="display:none">
    <div class="section-header">
      <span class="section-label">Slack теги команди</span>
      <div style="display:flex;gap:8px;align-items:center">
        <span style="font-size:11px;color:var(--dim)" id="tagsSaved"></span>
        <button class="btn-sm" id="resetTags">Скинути</button>
      </div>
    </div>
    <div class="tags-grid" id="tagsGrid"></div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <span class="date-label">Дата:</span>
    <input type="date" id="datePicker">
    <button class="btn" id="genBtn" disabled>Згенерувати</button>
    <span class="status" id="status">Файл не завантажено</span>
  </div>

  <!-- Editable color map -->
  <div class="color-map-section" id="colorMapSection" style="display:none">
    <div class="section-header">
      <span class="section-label">Назви проектів</span>
      <div style="display:flex;gap:8px;align-items:center">
        <span style="font-size:11px;color:var(--dim)" id="colorMapSaved"></span>
        <button class="btn-sm" id="resetColorMap">Скинути</button>
      </div>
    </div>
    <div class="color-map-grid" id="colorMapGrid"></div>
  </div>

  <!-- Results -->
  <div class="results" id="results">
    <div class="tabs">
      <button class="tab on" data-tab="preview">Превʼю</button>
      <button class="tab" data-tab="message">Повідомлення</button>
    </div>

    <div class="tabpanel on" id="tab-preview">
      <div style="font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:10px">Задачі</div>
      <div class="cards" id="cards"></div>
      <div style="font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;margin-top:8px">
        Делівері цього тижня
      </div>
      <div class="del-list" id="delList"></div>
    </div>

    <div class="tabpanel" id="tab-message">
      <div class="msgbox">
        <div class="msgbar">
          <div class="msgbar-dots"><span></span><span></span><span></span></div>
          <span class="msgbar-lbl">Slack</span>
        </div>
        <div class="msg" id="msgOut" contenteditable="true"></div>
      </div>
      <div class="copy-row">
        <button class="btn" id="copyBtn">Копіювати</button>
        <button class="btn btn-ghost" id="regenBtn">↻ Оновити</button>
        <span class="copy-ok" id="copyOk">✓ Скопійовано!</span>
      </div>
    </div>
  </div>

  <div class="error-box" id="errBox"></div>
</main>

<script>
// ── STATE ──────────────────────────────────────────────────────────────────────
let workbook = null;
let colorToProject = {};   // hex -> short project name (editable)
let allPersons = [];       // [{row, name}] from col C
let selectedPersons = new Set();
let deliveryItems = [];    // [{label, desc}]
let slackTags = {};        // {name: '@slack-tag'}

// Colors to skip (vacation, buffer)
const SKIP_COLORS = new Set(['FF00FF00','FFFF0000','00000000','FFFFFFFF','FFEAEEF3']);

// Rows to skip from person list (PM/lead rows, not artists)
// Only truly non-assignable service rows
const SERVICE_NAMES = new Set(['Інвойси','Юля','Ангеліна','Назар','Аніматори',
  'Художники','САУНД замовлення','Андрій']);

// ── INIT ───────────────────────────────────────────────────────────────────────
const today = new Date();
document.getElementById('datePicker').value = today.toISOString().slice(0,10);
document.getElementById('todayLbl').textContent =
  today.toLocaleDateString('uk-UA',{weekday:'long',day:'numeric',month:'long'});

// ── UPLOAD ─────────────────────────────────────────────────────────────────────
const uploadZone = document.getElementById('uploadZone');
const fileInput  = document.getElementById('fileInput');

uploadZone.addEventListener('dragover', e=>{e.preventDefault();uploadZone.classList.add('dragover')});
uploadZone.addEventListener('dragleave',()=>uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e=>{
  e.preventDefault(); uploadZone.classList.remove('dragover');
  if(e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change',()=>{ if(fileInput.files[0]) loadFile(fileInput.files[0]) });

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      workbook = XLSX.read(e.target.result,{type:'array',cellStyles:true});
      setStatus('✓ '+file.name,'ok');
      uploadZone.style.borderColor='var(--green)';
      document.getElementById('genBtn').disabled = false;
      hideErr();
      parseRoadmap();
    } catch(err){ showErr('Помилка читання: '+err.message) }
  };
  reader.readAsArrayBuffer(file);
}

// ── PARSE ROADMAP ──────────────────────────────────────────────────────────────
function parseRoadmap() {
  const ws = workbook.Sheets['Роадмап'];
  if(!ws){ showErr('Лист "Роадмап" не знайдено'); return; }

  // 1. Build color -> project name from col B (rows 5-35)
  colorToProject = {};
  for(let r=5; r<=35; r++) {
    const bAddr = XLSX.utils.encode_cell({r:r-1, c:1}); // col B
    const bCell = ws[bAddr];
    if(!bCell || !bCell.v) continue;
    const rgb = getCellRgb(ws, r, 2); // col B = index 2? no, B=2nd col=index 1
    const rgbB = getCellRgbRaw(bCell);
    if(rgbB && !SKIP_COLORS.has(rgbB) && rgbB !== 'FFEAEEF3') {
      const shortName = extractShortName(String(bCell.v));
      colorToProject[rgbB] = shortName;
    }
  }

  // 2. Read persons from col C
  allPersons = [];
  for(let r=5; r<=35; r++) {
    const cAddr = XLSX.utils.encode_cell({r:r-1, c:2}); // col C
    const cCell = ws[cAddr];
    if(!cCell || !cCell.v) continue;
    const name = String(cCell.v).trim();
    if(!SERVICE_NAMES.has(name)) {
      allPersons.push({row: r, name});
    }
  }

  // 3. Build person chips
  buildChips();
  buildTagsEditor();

  // 4. Build color map editor
  buildColorMapEditor();
  showColorMapStatus();

  document.getElementById('personSection').style.display = 'block';
  document.getElementById('colorMapSection').style.display = 'block';
}

function getCellRgbRaw(cell) {
  if(!cell || !cell.s) return null;
  const s = cell.s;
  const tryColor = c => {
    if(!c) return null;
    if(c.rgb && typeof c.rgb==='string') {
      const v = c.rgb.toUpperCase();
      if(v==='00000000'||v==='FFFFFFFF') return null;
      return v.length===6 ? 'FF'+v : v;
    }
    return null;
  };
  return tryColor(s.fgColor) || tryColor(s.bgColor) || null;
}

function getCellRgb(ws, row, col) {
  const addr = XLSX.utils.encode_cell({r:row-1, c:col-1});
  return getCellRgbRaw(ws[addr]);
}

function getCellVal(ws, row, col) {
  const addr = XLSX.utils.encode_cell({r:row-1, c:col-1});
  const cell = ws[addr];
  if(!cell) return null;
  return cell.v != null ? String(cell.v).trim() : null;
}

function extractShortName(full) {
  // "Ela Games (Yuliia) Stas" -> "Ela Games"
  // "Bang Bang Games (Nazar) - Stas" -> "Bang Bang Games"
  // "Foxium marketing (Angelina) - Stas/Elina" -> "Foxium marketing"
  let s = full.replace(/\s*\([^)]*\)/g,''); // remove (...)
  s = s.replace(/\s*-\s*[\w/]+\s*$/,'');    // remove "- Stas" or "- Stas/Elina"
  return s.trim();
}

// ── PERSON CHIPS ───────────────────────────────────────────────────────────────
function buildChips() {
  selectedPersons = new Set(allPersons.map(p=>p.name));
  const container = document.getElementById('chips');
  container.innerHTML = '';
  for(const p of allPersons) {
    const chip = document.createElement('div');
    chip.className = 'chip on';
    chip.textContent = p.name;
    chip.dataset.name = p.name;
    chip.addEventListener('click', ()=>{
      const on = chip.classList.contains('on');
      chip.classList.toggle('on', !on);
      if(on) selectedPersons.delete(p.name); else selectedPersons.add(p.name);
      updateToggle();
    });
    container.appendChild(chip);
  }
  updateToggle();
}

function updateToggle() {
  const btn = document.getElementById('toggleAll');
  btn.textContent = selectedPersons.size===allPersons.length ? 'Зняти всіх' : 'Вибрати всіх';
}

document.getElementById('toggleAll').addEventListener('click', ()=>{
  const allOn = selectedPersons.size===allPersons.length;
  if(allOn){
    selectedPersons.clear();
    document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  } else {
    allPersons.forEach(p=>selectedPersons.add(p.name));
    document.querySelectorAll('.chip').forEach(c=>c.classList.add('on'));
  }
  updateToggle();
});

// ── SLACK TAGS EDITOR ────────────────────────────────────────────────────────
function buildTagsEditor() {
  const grid = document.getElementById('tagsGrid');
  const section = document.getElementById('tagsSection');
  if (!grid || !section) return;
  grid.innerHTML = '';
  section.style.display = 'block';

  const saved = loadSavedTags();

  for (const {name} of allPersons) {
    const savedTag = saved && saved[name] !== undefined ? saved[name] : '';
    slackTags[name] = savedTag;

    const row = document.createElement('div');
    row.className = 'tag-row';
    row.innerHTML =
      `<span class="tag-name">${name}</span>` +
      `<input class="tag-input" data-name="${name}" value="${savedTag}" placeholder="@slack-tag">`;
    row.querySelector('input').addEventListener('input', e => {
      slackTags[e.target.dataset.name] = e.target.value.trim();
      saveTags();
    });
    grid.appendChild(row);
  }
  showTagsStatus();
}

function saveTags() {
  try {
    localStorage.setItem('picshot_slack_tags', JSON.stringify(slackTags));
    showTagsStatus();
  } catch(e) {}
}

function loadSavedTags() {
  try {
    const raw = localStorage.getItem('picshot_slack_tags');
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

function showTagsStatus() {
  const saved = localStorage.getItem('picshot_slack_tags');
  const el = document.getElementById('tagsSaved');
  if (el) el.textContent = saved ? '✓ збережено' : '';
}

// ── COLOR MAP EDITOR ───────────────────────────────────────────────────────────
function buildColorMapEditor() {
  const grid = document.getElementById('colorMapGrid');
  grid.innerHTML = '';
  // Also add the "extra" colors that appear in tasks but not in col B
  const extraColors = {
    'FF9FC5E8': 'Elk Studios',
    'FFD5A6BD': 'Bang Bang',
    'FFF9CB9C': '',
    'FFF6B26B': '',
  };
  for(const [rgb, name] of Object.entries(extraColors)) {
    if(!(rgb in colorToProject)) colorToProject[rgb] = name;
  }

  // Load saved names from localStorage
  const saved = loadSavedColorMap();

  for(const [rgb, name] of Object.entries(colorToProject)) {
    if(!name && !['FF9FC5E8','FFD5A6BD','FFF9CB9C','FFF6B26B'].includes(rgb)) continue;
    const dispColor = '#'+rgb.slice(2).toLowerCase();
    // Use saved name if available, otherwise use auto-detected name
    const displayName = (saved && saved[rgb] !== undefined) ? saved[rgb] : name;
    colorToProject[rgb] = displayName;
    const row = document.createElement('div');
    row.className = 'color-map-row';
    row.innerHTML = `
      <div class="color-swatch" style="background:${dispColor}"></div>
      <span class="color-label">${dispColor}</span>
      <input class="color-input" data-rgb="${rgb}" value="${displayName}" placeholder="назва проекту">`;
    row.querySelector('input').addEventListener('input', e=>{
      colorToProject[e.target.dataset.rgb] = e.target.value;
      saveColorMap();
    });
    grid.appendChild(row);
  }
}

function showColorMapStatus() {
  const saved = localStorage.getItem('picshot_color_map');
  const el = document.getElementById('colorMapSaved');
  if (el) el.textContent = saved ? '✓ збережено' : '';
}

document.getElementById('resetTags').addEventListener('click', () => {
  localStorage.removeItem('picshot_slack_tags');
  slackTags = {};
  buildTagsEditor();
});

document.getElementById('resetColorMap').addEventListener('click', () => {
  localStorage.removeItem('picshot_color_map');
  buildColorMapEditor();
  const el = document.getElementById('colorMapSaved');
  if (el) el.textContent = '';
});

function saveColorMap() {
  try {
    localStorage.setItem('picshot_color_map', JSON.stringify(colorToProject));
    showColorMapStatus();
  } catch(e) {}
}

function loadSavedColorMap() {
  try {
    const raw = localStorage.getItem('picshot_color_map');
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

// ── FIND DATE COLUMN ───────────────────────────────────────────────────────────
function findDayNumCol(ws, dateStr) {
  // Row 3 has day numbers as numeric values (e.g. 10.0 for June 10)
  // Row 2 has month names as strings
  const d = new Date(dateStr+'T12:00:00');
  const dayNum = d.getDate();
  const monthIdx = d.getMonth();
  const months_uk = ['січень','лютий','березень','квітень','травень','червень',
                      'липень','серпень','вересень','жовтень','листопад','грудень'];
  const months_en = ['january','february','march','april','may','june',
                      'july','august','september','october','november','december'];

  const range = XLSX.utils.decode_range(ws['!ref']||'A1');
  let best = null;

  for(let c=range.s.c; c<=range.e.c; c++) {
    const cell = ws[XLSX.utils.encode_cell({r:2,c})]; // row 3
    if(!cell || typeof cell.v !== 'number') continue;
    if(Math.round(cell.v) !== dayNum) continue;

    // verify month
    let monthOk = false;
    for(let mc=c; mc>=Math.max(0,c-15); mc--) {
      const mc2 = ws[XLSX.utils.encode_cell({r:1,mc})];
      // need to use correct encode
      const mcell = ws[XLSX.utils.encode_cell({r:1,c:mc})];
      if(!mcell||!mcell.v) continue;
      const mv = String(mcell.v).toLowerCase().trim();
      if(mv.startsWith(months_uk[monthIdx].slice(0,4))||
         mv.startsWith(months_en[monthIdx].slice(0,3))) {
        monthOk=true; break;
      }
    }
    if(monthOk){ best = c+1; break; } // 1-based
    if(best===null) best = c+1;
  }
  return best; // this col has day number; col-1 = до14, this col = після14
}

// ── GENERATE ──────────────────────────────────────────────────────────────────
// ── TASK TIMING LOOKAHEAD ─────────────────────────────────────────────────────
function isWeekLabelCol(ws, col1based) {
  const cell = ws[XLSX.utils.encode_cell({r:2, c:col1based-1})]; // row 3
  return cell && cell.v && String(cell.v).startsWith('Week');
}

function getNextSlots(ws, rowIdx, fromCol, n) {
  // Returns next n task cell values after fromCol, skipping Week-label cols
  const result = [];
  let col = fromCol + 1;
  while (result.length < n && col <= 140) {
    if (!isWeekLabelCol(ws, col)) {
      const cell = ws[XLSX.utils.encode_cell({r: rowIdx-1, c: col-1})];
      result.push(cell ? (cell.v != null ? String(cell.v).trim() : null) : null);
    }
    col++;
  }
  return result;
}

function remainingLabel(task, nextSlots, todaySlot) {
  if (!task) return '';
  const t = task.trim();

  let lastIdx = -1;
  let count = 0;
  for (let i = 0; i < nextSlots.length; i++) {
    if (nextSlots[i] && nextSlots[i].trim() === t) {
      lastIdx = i; count++;
    }
  }

  if (count === 0) {
    // Finishes in current slot today
    // If в до обіду slot → "закінчити до обіду" would duplicate the slot label → skip
    // If в після обіду slot → useful to say "закінчити до кінця дня"
    // But only add if there are TWO different tasks (do≠pislya); for same task all day → skip
    return todaySlot === 'pislya' ? 'закінчити до кінця дня' : '';
  }
  // Has remaining slots — just say how much, no "закінчити" suffix
  if (count === 1) return 'завтра ще пів дня';
  if (count === 2) return 'завтра ще повний день';
  const days = Math.round(count / 2);
  return `ще ~${days} дні`;
}

document.getElementById('genBtn').addEventListener('click', generate);
document.getElementById('regenBtn').addEventListener('click', generate);

function generate() {
  hideErr();
  const dateStr = document.getElementById('datePicker').value;
  if(!dateStr||!workbook) return;

  const ws = workbook.Sheets['Роадмап'];
  if(!ws){ showErr('Лист "Роадмап" не знайдено'); return; }

  const dayNumCol = findDayNumCol(ws, dateStr);
  if(!dayNumCol){ showErr(`Дату ${dateStr} не знайдено в роадмапі`); return; }

  const col_do    = dayNumCol - 1; // до 14-00
  const col_pislya= dayNumCol;     // після 14-00

  // Collect person data
  const persons = [];
  for(const {row, name} of allPersons) {
    if(!selectedPersons.has(name)) continue;

    const task_do    = getCellVal(ws, row, col_do);
    const task_pislya= getCellVal(ws, row, col_pislya);
    const rgb_do     = getCellRgb(ws, row, col_do);
    const rgb_pislya = getCellRgb(ws, row, col_pislya);

    const skip_do    = !task_do    || SKIP_COLORS.has(rgb_do);
    const skip_pislya= !task_pislya|| SKIP_COLORS.has(rgb_pislya);

    // Lookahead: next 6 half-day slots after col_pislya
    const nextSlots = getNextSlots(ws, row, col_pislya, 6);
    const timing_do     = skip_do     ? '' : remainingLabel(task_do,     nextSlots, 'do');
    const timing_pislya = skip_pislya ? '' : remainingLabel(task_pislya, nextSlots, 'pislya');

    persons.push({
      name,
      do:    skip_do    ? null : task_do,
      pislya:skip_pislya? null : task_pislya,
      client_do:    skip_do    ? null : (colorToProject[rgb_do]    || null),
      client_pislya:skip_pislya? null : (colorToProject[rgb_pislya]|| null),
      timing_do, timing_pislya,
      rgb_do, rgb_pislya
    });
  }

  // Collect delivery for this week
  deliveryItems = getDelivery(ws, dayNumCol);

  renderPreview(persons);
  renderMessage(persons, dateStr);
  document.getElementById('results').classList.add('show');
}

// ── DELIVERY ──────────────────────────────────────────────────────────────────
function getDelivery(ws, dayNumCol) {
  // Find Monday col: scan row 3 backwards for 'Mon' label
  let monCol = null;
  for(let c=dayNumCol-2; c>=0; c--) {
    const cell = ws[XLSX.utils.encode_cell({r:2,c})];
    if(cell && cell.v && String(cell.v).toLowerCase()==='mon') {
      monCol = c+1; break; // 1-based
    }
  }
  if(!monCol) return [];

  // Find delivery header row in monCol
  let hdrRow = null;
  for(let r=25; r<=42; r++) {
    const v = getCellVal(ws, r, monCol);
    if(v && v.includes('елівері')) { hdrRow=r; break; }
  }
  if(!hdrRow) return [];

  const items = [];
  for(let r=hdrRow+1; r<=hdrRow+20; r++) {
    const label = getCellVal(ws, r, monCol);
    const desc  = getCellVal(ws, r, monCol+1);
    if(!label) continue;
    if(/^Делівері\s*\d*$/.test(label.trim())) continue;
    const rgb = getCellRgb(ws, r, monCol);
    items.push({label:label.trim(), desc:(desc||'').trim(), rgb});
  }
  return items;
}

// ── RENDER PREVIEW ────────────────────────────────────────────────────────────
function renderPreview(persons) {
  const grid = document.getElementById('cards');
  grid.innerHTML = '';

  for(const p of persons) {
    const card = document.createElement('div');
    card.className = 'card';

    const nameEl = document.createElement('div');
    nameEl.className = 'card-name';
    nameEl.innerHTML = `<span>@</span>${p.name}`;
    card.appendChild(nameEl);

    if(!p.do && !p.pislya) {
      const v = document.createElement('div');
      v.className='vacation'; v.textContent='відпустка / вихідний';
      card.appendChild(v);
    } else if(p.do && p.pislya && p.client_do===p.client_pislya) {
      // same client all day
      const row = makeTaskRow(null, p.do+(p.do!==p.pislya?', '+p.pislya:''), p.client_do, p.rgb_do);
      card.appendChild(row);
    } else {
      if(p.do)    card.appendChild(makeTaskRow('до обіду', p.do, p.client_do, p.rgb_do));
      if(p.pislya)card.appendChild(makeTaskRow('після обіду', p.pislya, p.client_pislya, p.rgb_pislya));
    }
    grid.appendChild(card);
  }

  // Delivery — chips (click to toggle on/off)
  const dlist = document.getElementById('delList');
  dlist.innerHTML = '';
  if(!deliveryItems.length) {
    dlist.innerHTML = '<div style="color:var(--muted);font-size:13px">Делівері не знайдено</div>';
    return;
  }
  const chipsWrap = document.createElement('div');
  chipsWrap.className = 'del-chips';
  for(const item of deliveryItems) addDelChip(chipsWrap, item.label, item.desc, item.rgb);
  dlist.appendChild(chipsWrap);
  const note = document.createElement('div');
  note.className = 'del-note';
  note.textContent = '↑ Натисни щоб увімкнути деліврі для сьогоднішнього повідомлення';
  dlist.appendChild(note);
}

function makeTaskRow(timeLabel, taskText, clientName, rgb) {
  const row = document.createElement('div');
  row.className = 'task-row';
  const dispColor = rgb ? '#'+rgb.slice(2).toLowerCase() : '#888';
  const pillBg = rgb ? dispColor+'22' : '';
  row.innerHTML = (timeLabel ? `<span class="task-time">${timeLabel}</span>` : '')+
    `<span class="task-text">${taskText}`+
    (clientName ? `<span class="pill" style="background:${pillBg};color:${dispColor}">${clientName}</span>` : '')+
    `</span>`;
  return row;
}

function addDelChip(container, label, desc, rgb) {
  const chip = document.createElement('div');
  chip.className = 'del-chip'; // starts OFF
  const clientName = rgb ? (colorToProject[rgb] || '') : '';
  const dispColor  = rgb && rgb.length===8 ? '#'+rgb.slice(2).toLowerCase() : '#666';
  const pillHtml = clientName
    ? `<span class="del-client-pill" style="background:${dispColor}22;color:${dispColor}">${clientName}</span>`
    : '';
  chip.innerHTML =
    `<div class="del-chip-dot"${rgb ? ` style="background:${dispColor}"` : ''}></div>`+
    `<div>`+
      `<div class="del-chip-text">${label}${pillHtml}</div>`+
      (desc ? `<div class="del-chip-desc">${desc}</div>` : '')+
    `</div>`;
  chip.dataset.label = label;
  chip.dataset.desc  = desc||'';
  chip.addEventListener('click', ()=>{
    chip.classList.toggle('on');
    syncDeliveryBlock();
  });
  container.appendChild(chip);
}

function syncDeliveryBlock() {
  const msgEl = document.getElementById('msgOut');
  let text = msgEl.textContent;
  const active = Array.from(document.querySelectorAll('.del-chip.on')).map(c=>({
    label: c.dataset.label,
    desc:  c.dataset.desc
  }));
  const delStart = text.indexOf('\nДелівері на сьогодні:');
  const delEnd   = text.indexOf('\n\nВсім гарного');
  // If no delimiter yet, insert before footer
  if(delStart < 0) {
    // add delivery block before footer if there are active items
    if(active.length) {
      const footerIdx = text.indexOf('\n\nВсім гарного');
      if(footerIdx >= 0) {
        const before = text.slice(0, footerIdx);
        const after  = text.slice(footerIdx);
        msgEl.textContent = before+'\nДелівері на сьогодні:\n'+
          active.map(i=>`• ${i.label}${i.desc?' — '+i.desc:''}`).join('\n')+after;
      }
    }
    return;
  }
  const before = text.slice(0, delStart);
  const after  = delEnd>=0 ? text.slice(delEnd) : '';
  const newDel = active.length
    ? '\nДелівері на сьогодні:\n'+active.map(i=>`• ${i.label}${i.desc?' — '+i.desc:''}`).join('\n')
    : '';
  msgEl.textContent = before+newDel+after;
}

// ── RENDER MESSAGE ────────────────────────────────────────────────────────────
function renderMessage(persons, dateStr) {
  const lines = ['Добрий ранок! 🌅','','По задачам сьогодні:'];

  for(const p of persons) {
    if(!p.do && !p.pislya) continue;
    const tag = slackTags[p.name] ? slackTags[p.name] : `@${p.name}`;
    let line = `${tag} `;

    if(p.do && p.pislya) {
      if(p.client_do===p.client_pislya) {
        if(p.do===p.pislya) {
          line += `${p.do}`;
          if(p.client_do) line += ` (${p.client_do})`;
          if(p.timing_do) line += `, ${p.timing_do}`;
        } else {
          line += `до обіду — ${p.do}, після обіду — ${p.pislya}`;
          if(p.client_do) line += ` (${p.client_do})`;
          if(p.timing_pislya) line += `, ${p.timing_pislya}`;
        }
      } else {
        const part1 = `до обіду — ${p.do}${p.client_do?' ('+p.client_do+')':''}${p.timing_do?', '+p.timing_do:''}`;
        const part2 = `після обіду — ${p.pislya}${p.client_pislya?' ('+p.client_pislya+')':''}${p.timing_pislya?', '+p.timing_pislya:''}`;
        line += `${part1}, ${part2}`;
      }
    } else if(p.do) {
      line += p.do+(p.client_do?' ('+p.client_do+')':'');
      if(p.timing_do) line += `, ${p.timing_do}`;
    } else {
      line += p.pislya+(p.client_pislya?' ('+p.client_pislya+')':'');
      if(p.timing_pislya) line += `, ${p.timing_pislya}`;
    }
    lines.push(line);
  }

  // Delivery block starts empty — PM taps chips to add items

  lines.push('','Всім гарного і тихого дня! 🍀');
  document.getElementById('msgOut').textContent = lines.join('\n');
}

// ── TABS ──────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const t = btn.dataset.tab;
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
    document.querySelectorAll('.tabpanel').forEach(p=>p.classList.remove('on'));
    btn.classList.add('on');
    document.getElementById('tab-'+t).classList.add('on');
  });
});

// ── COPY ──────────────────────────────────────────────────────────────────────
document.getElementById('copyBtn').addEventListener('click',()=>{
  navigator.clipboard.writeText(document.getElementById('msgOut').textContent).then(()=>{
    const fb=document.getElementById('copyOk');
    fb.classList.add('show');
    setTimeout(()=>fb.classList.remove('show'),2000);
  });
});

// ── HELPERS ───────────────────────────────────────────────────────────────────
function setStatus(msg,cls){ const e=document.getElementById('status');e.textContent=msg;e.className='status '+(cls||''); }
function showErr(msg){ const e=document.getElementById('errBox');e.textContent='⚠ '+msg;e.style.display='block'; }
function hideErr(){ document.getElementById('errBox').style.display='none'; }
